version: '3.8'

services:
  meetvoice-ia:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meetvoice-ia
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      - PYTHONUNBUFFERED=1
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8081
    env_file:
      - .env
    volumes:
      - ./audio:/app/audio
      - ./.model_cache:/app/.model_cache
    networks:
      - meetvoice_network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  meetvoice_network:
    driver: bridge
